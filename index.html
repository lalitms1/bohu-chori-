<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Bohu Chori - The Ultimate Chase</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Baloo 2', cursive; background: #000; touch-action: none; user-select: none; }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; box-sizing: border-box; font-size: 24px; font-weight: bold; color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9); pointer-events: none; z-index: 10; display: none;
        }

        #stamina-container {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 10px; background: rgba(255,255,255,0.3);
            border-radius: 5px; border: 2px solid #fff; display: none; z-index: 10;
        }
        #stamina-fill { width: 100%; height: 100%; background: #00e5ff; border-radius: 3px; transition: width 0.1s linear; }

        #ingame-instructions {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7); padding: 10px 20px; border-radius: 30px;
            color: #fff; font-size: 16px; text-align: center; border: 2px solid #00e5ff;
            text-shadow: 1px 1px 2px #000; pointer-events: none; z-index: 10; display: none; width: 90%; max-width: 600px;
        }
        
        .overlay-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 250, 240, 0.95); padding: 30px 40px; border-radius: 20px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.6); z-index: 20;
            border: 4px solid #e76f51; color: #264653; width: 85%; max-width: 500px;
        }
        button {
            background-color: #e76f51; color: white; border: none; padding: 12px 20px;
            font-size: 20px; font-family: 'Baloo 2', cursive; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px #c44536; transition: 0.1s; margin: 5px; width: 100%;
        }
        button:active { transform: translateY(4px); box-shadow: 0 0px #c44536; }
        .btn-green { background-color: #2a9d8f; box-shadow: 0 4px #1f7a6f; }
        .btn-blue { background-color: #0077b6; box-shadow: 0 4px #005f8e; }
        h1, h2 { color: #d90429; margin-top: 0; }
        
        #joystick-container {
            position: absolute; bottom: 50px; left: 30px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%; z-index: 15; touch-action: none; display: none;
        }
        #joystick-knob {
            position: absolute; top: 30px; left: 30px; width: 60px; height: 60px;
            background: rgba(0, 229, 255, 0.8); border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.5); pointer-events: none;
        }

        #dash-btn {
            position: absolute; bottom: 60px; right: 40px; width: 80px; height: 80px;
            background: rgba(0, 229, 255, 0.8); border: 3px solid #fff; border-radius: 50%;
            color: #fff; font-weight: bold; font-size: 18px; display: none;
            justify-content: center; align-items: center; z-index: 15; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #dash-btn:active { transform: scale(0.95); }

        .speech-bubble {
            position: absolute; background: white; border: 2px solid #264653; border-radius: 15px;
            padding: 5px 10px; font-size: 14px; font-weight: bold; color: #264653;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); pointer-events: none; z-index: 5;
            transform: translate(-50%, -100%); white-space: nowrap; transition: opacity 0.3s;
        }
        .speech-bubble::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            border-width: 8px 8px 0; border-style: solid; border-color: white transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <span id="lives-display">Lives: 3</span>
        <span id="status-display">Tag the Bohu!</span>
        <span id="timer-display">Time: 180</span>
    </div>
    <div id="stamina-container"><div id="stamina-fill"></div></div>

    <div id="ingame-instructions">
        🎮 <b>PC:</b> WASD + SHIFT to Dash | 📱 <b>Mobile:</b> Joystick + Dash<br>
        <i>Listen closely: Water slows you down, Dashing escapes enemies!</i>
    </div>

    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <div id="dash-btn">DASH</div>

    <div id="main-menu" class="overlay-card">
        <h2>Bohu Chori 3D</h2>
        <p>A Traditional Chase</p>
        <button class="btn-green" onclick="startGame(1)">🌳 1. Village (Laterite Ground)</button>
        <button class="btn-blue" onclick="startGame(2)">🌊 2. River Crossing</button>
        <button onclick="startGame(3)">🚲 3. Street Chase</button>
    </div>

    <div id="game-over" class="overlay-card" style="display:none;">
        <h1 id="end-title">Game Over!</h1>
        <p id="end-desc"></p>
        <button onclick="document.getElementById('game-over').style.display='none'; document.getElementById('main-menu').style.display='block';">Main Menu</button>
    </div>

    <script>
        // ================== AUDIO ENGINE ==================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (type === 'footstep') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(120, now); osc.frequency.exponentialRampToValueAtTime(10, now + 0.1);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'splash') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, now); osc.frequency.linearRampToValueAtTime(20, now + 0.2);
                gain.gain.setValueAtTime(0.08, now); gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'dash') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'pickup') {
                osc.type = 'square'; osc.frequency.setValueAtTime(600, now); osc.frequency.setValueAtTime(900, now+0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now+0.2);
                osc.start(now); osc.stop(now+0.2);
            } else if (type === 'catch_bohu') {
                osc.type = 'square'; osc.frequency.setValueAtTime(440, now); // A4
                osc.frequency.setValueAtTime(554, now + 0.1); // C#5
                osc.frequency.setValueAtTime(659, now + 0.2); // E5
                gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'hit') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        // ================== INPUT & MOBILE ==================
        let joyX = 0, joyZ = 0; let isDashing = false;
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, Shift: false };
        
        window.addEventListener("keydown", (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener("keyup", (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        const joyZone = document.getElementById("joystick-container");
        const joyKnob = document.getElementById("joystick-knob");
        const dashBtn = document.getElementById("dash-btn");
        let dragging = false;
        const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.innerWidth <= 768);

        function handleTouch(e) {
            e.preventDefault(); const touch = e.touches[0] || e.changedTouches[0];
            const rect = joyZone.getBoundingClientRect();
            let dx = touch.clientX - (rect.left + rect.width / 2);
            let dy = touch.clientY - (rect.top + rect.height / 2);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 30);
            const angle = Math.atan2(dy, dx);
            joyX = (dist / 30) * Math.cos(angle); joyZ = (dist / 30) * Math.sin(angle);
            joyKnob.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
        }

        joyZone.addEventListener("touchstart", (e) => { dragging = true; handleTouch(e); }, {passive: false});
        joyZone.addEventListener("touchmove", (e) => { if(dragging) handleTouch(e); }, {passive: false});
        joyZone.addEventListener("touchend", (e) => { e.preventDefault(); dragging = false; joyX = joyZ = 0; joyKnob.style.transform = `translate(0px, 0px)`; }, {passive: false});
        dashBtn.addEventListener("touchstart", (e) => { e.preventDefault(); isDashing = true; }, {passive: false});
        dashBtn.addEventListener("touchend", (e) => { e.preventDefault(); isDashing = false; }, {passive: false});

        // ================== ENGINE SETUP ==================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); scene.fog = new THREE.Fog(0x87CEEB, 20, 150);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight); renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sunLight = new THREE.DirectionalLight(0xfffaed, 0.8); sunLight.castShadow = true;
        sunLight.position.set(50, 100, 50); scene.add(sunLight);

        let particles = [];
        const particleGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
        function spawnDust(x, y, z, isWater = false) {
            const mat = new THREE.MeshBasicMaterial({color: isWater ? 0xffffff : 0xdddddd, transparent: true, opacity: 0.8});
            const p = new THREE.Mesh(particleGeo, mat);
            p.position.set(x + (Math.random()-0.5), y, z + (Math.random()-0.5));
            p.userData = { life: 1.0 }; scene.add(p); particles.push(p);
        }

        // ================== BUILDERS & THEMES ==================
        const villageSize = 140; let currentTheme = 1; let obstacles =[]; let vehicles =[];
        let sceneryGroup = new THREE.Group(); scene.add(sceneryGroup);
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(villageSize, villageSize), new THREE.MeshStandardMaterial({ color: 0xba6340 })); 
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);

        function createModel(type) {
            const group = new THREE.Group();
            if (type === 'hut') {
                const hut = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 8), new THREE.MeshStandardMaterial({color: 0xd4a373})); hut.position.y = 3; hut.castShadow=true;
                const roof = new THREE.Mesh(new THREE.ConeGeometry(6, 5, 4), new THREE.MeshStandardMaterial({color: 0xe9c46a})); roof.position.y=8.5; roof.rotation.y=Math.PI/4; roof.castShadow=true;
                group.add(hut, roof);
            } else if (type === 'tree') {
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 1, 6), new THREE.MeshStandardMaterial({color: 0x5c4033})); trunk.position.y = 3; trunk.castShadow=true;
                const leaves = new THREE.Mesh(new THREE.SphereGeometry(4, 8, 8), new THREE.MeshStandardMaterial({color: 0x386641})); leaves.position.y = 7; leaves.castShadow=true;
                group.add(trunk, leaves);
            } else if (type === 'bike') {
                const wGeo = new THREE.TorusGeometry(1, 0.1, 8, 16); const wMat = new THREE.MeshStandardMaterial({color:0x333});
                const w1 = new THREE.Mesh(wGeo, wMat); w1.position.set(0, 1, -2); w1.castShadow=true;
                const w2 = new THREE.Mesh(wGeo, wMat); w2.position.set(0, 1, 2); w2.castShadow=true;
                const frame = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 4), new THREE.MeshStandardMaterial({color:0x2a9d8f})); frame.position.set(0, 1.5, 0); frame.castShadow=true;
                group.add(w1, w2, frame); group.scale.set(0.8,0.8,0.8);
            } else if (type === 'boat') {
                const hull = new THREE.Mesh(new THREE.BoxGeometry(5, 1.5, 9), new THREE.MeshStandardMaterial({color: 0x6f4e37})); hull.position.y=0.5; hull.castShadow=true;
                group.add(hull); group.scale.set(0.9,0.9,0.9);
            }
            return group;
        }

        function loadTheme(themeId) {
            currentTheme = themeId; sceneryGroup.clear(); obstacles =[]; vehicles =[];
            ground.material.color.setHex(themeId === 1 ? 0xba6340 : themeId === 2 ? 0x606c38 : 0x9e9e9e);
            for (let i=0; i<40; i++) spawnStatic(Math.random()>0.5?'tree':'hut');
            
            if(themeId === 2) {
                const river = new THREE.Mesh(new THREE.PlaneGeometry(villageSize, 40), new THREE.MeshStandardMaterial({ color: 0x4fc3f7, transparent: true, opacity:0.8 }));
                river.rotation.x = -Math.PI/2; river.position.y = 0.1; sceneryGroup.add(river);
                for (let i=0; i<6; i++) spawnVehicle('boat', true);
            } else {
                for (let i=0; i<8; i++) spawnVehicle('bike', false);
            }
        }
        function spawnStatic(type) {
            let x = (Math.random()-0.5)*120; let z = (Math.random()-0.5)*120;
            if (Math.abs(x) < 15) x += (x>0? 15:-15); 
            const mesh = createModel(type); mesh.position.set(x, 0, z);
            sceneryGroup.add(mesh); obstacles.push({x:x, z:z, radius: 3});
        }
        function spawnVehicle(type, nearRiver=false) {
            let x = (Math.random()-0.5)*100; let z = nearRiver ? (Math.random()-0.5)*30 : (Math.random()-0.5)*100;
            const mesh = createModel(type); mesh.position.set(x, 0.5, z);
            sceneryGroup.add(mesh); vehicles.push({type:type, mesh:mesh});
        }
        function checkCollision(x, z, r) {
            if (Math.abs(x) > villageSize/2 || Math.abs(z) > villageSize/2) return true;
            for (let obs of obstacles) if (Math.hypot(x - obs.x, z - obs.z) < (r + obs.radius)) return true; return false;
        }

        // ================== HUMANOIDS ==================
        function createHumanoid(clothColor, skinColor, isPlayer = false) {
            const group = new THREE.Group(); 
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2, 1), new THREE.MeshStandardMaterial({color: clothColor})); body.position.y = 1.5; body.castShadow = true;
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.6), new THREE.MeshStandardMaterial({color: skinColor})); head.position.y = 3.1; head.castShadow = true;
            group.add(body, head); 
            if (isPlayer) {
                const markerGeo = new THREE.RingGeometry(1.2, 1.6, 32);
                const markerMat = new THREE.MeshBasicMaterial({color: 0x00ff00, transparent: true, opacity: 0.8, side: THREE.DoubleSide});
                const marker = new THREE.Mesh(markerGeo, markerMat); marker.rotation.x = -Math.PI / 2; marker.position.y = 0.2; group.add(marker);
            }
            group.userData = { vehicle: null, vMesh: null, lastSpeech: 0 }; 
            return group;
        }

        let playerMesh = createHumanoid(0x22223b, 0x8d5524, true); scene.add(playerMesh);
        let brideMesh = createHumanoid(0xd90429, 0x8d5524); scene.add(brideMesh);
        let enemies = []; let speechBubbles =[];

        function showSpeech(mesh, text) {
            const div = document.createElement('div'); div.className = 'speech-bubble'; div.innerText = text;
            document.body.appendChild(div); speechBubbles.push({ mesh: mesh, element: div, timer: 1.5 });
        }

        function equipVehicle(entity, vType) {
            if(entity.userData.vMesh) entity.remove(entity.userData.vMesh);
            entity.userData.vehicle = vType;
            if(!vType) { entity.userData.vMesh = null; return; }
            entity.userData.vMesh = createModel(vType);
            if(vType === 'bike') entity.userData.vMesh.position.set(0, -0.5, 0); 
            if(vType === 'boat') entity.userData.vMesh.position.set(0, -0.5, 0); 
            entity.add(entity.userData.vMesh);
        }

        // ================== GAME LOGIC ==================
        let isPlaying = false; let lives = 3; let timeLeft = 180; let hasBohu = false; let footstepTimer = 0;
        let stamina = 100; const maxStamina = 100;

        function startGame(themeId) {
            initAudio(); // Required to unlock Web Audio context
            document.getElementById("main-menu").style.display = "none";
            document.getElementById("ui-layer").style.display = "flex";
            document.getElementById("stamina-container").style.display = "block";
            document.getElementById("ingame-instructions").style.display = "block";
            if(isMobile) { document.getElementById("joystick-container").style.display = "block"; document.getElementById("dash-btn").style.display = "flex"; }
            
            loadTheme(themeId);
            playerMesh.position.set(0, 0, villageSize/2 - 5); equipVehicle(playerMesh, null);
            camera.position.set(playerMesh.position.x, 28, playerMesh.position.z + 32); camera.lookAt(playerMesh.position);

            brideMesh.position.set(0, 0, -villageSize/2 + 5); brideMesh.visible = true; hasBohu = false;
            if(playerMesh.getObjectByName("brideIcon")) playerMesh.remove(playerMesh.getObjectByName("brideIcon"));

            enemies.forEach(e => scene.remove(e.mesh)); enemies =[];
            for(let i=0; i<4; i++) {
                let mesh = createHumanoid(0xffca28, 0x8d5524); mesh.position.set((Math.random()-0.5)*40, 0, (Math.random()-0.5)*40); scene.add(mesh); 
                enemies.push({mesh:mesh, speed:12, role: i}); 
            }
            lives = 3; timeLeft = 180; stamina = 100; isPlaying = true; updateUI();
            setTimeout(() => showSpeech(playerMesh, "Let's grab the Bohu!"), 500);
        }

        function updateUI() {
            document.getElementById("lives-display").innerText = `Lives: ${lives}`;
            document.getElementById("timer-display").innerText = `Time: ${timeLeft}`;
        }
        setInterval(() => { if(isPlaying && timeLeft > 0) { timeLeft--; updateUI(); if(timeLeft <= 0) gameOver(false); } }, 1000);

        function gameOver(win) {
            isPlaying = false;
            document.getElementById("ui-layer").style.display = "none"; document.getElementById("stamina-container").style.display = "none";
            document.getElementById("joystick-container").style.display = "none"; document.getElementById("dash-btn").style.display = "none";
            document.getElementById("game-over").style.display = "block";
            document.getElementById("end-title").innerText = win ? "Victory!" : "Game Over!";
            document.getElementById("end-title").style.color = win ? "#00e5ff" : "#e76f51";
            document.getElementById("end-desc").innerText = win ? "You rescued the Bohu and escaped!" : "The Warriors caught you.";
            speechBubbles.forEach(b => document.body.removeChild(b.element)); speechBubbles=[];
        }

        // ================== RENDER LOOP ==================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate); const dt = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();

            if (isPlaying) {
                let activeDash = (keys.Shift || isDashing) && stamina > 0;
                if(activeDash) { stamina = Math.max(0, stamina - 40 * dt); if(Math.random()>0.8) playSound('dash'); }
                else stamina = Math.min(maxStamina, stamina + 15 * dt);
                
                const fill = document.getElementById("stamina-fill");
                fill.style.width = stamina + "%"; fill.style.backgroundColor = stamina < 20 ? "#e76f51" : "#00e5ff";

                let inWater = (currentTheme === 2 && Math.abs(playerMesh.position.z) < 20);
                
                if(inWater && playerMesh.userData.vehicle === 'bike') { equipVehicle(playerMesh, null); showSpeech(playerMesh, "My bike sank!"); playSound('splash'); } 
                else if (!inWater && playerMesh.userData.vehicle === 'boat') { equipVehicle(playerMesh, null); showSpeech(playerMesh, "Grounded!"); }

                let speedMult = 1;
                if(inWater) { speedMult = playerMesh.userData.vehicle === 'boat' ? 1.5 : 0.4; } 
                else { speedMult = playerMesh.userData.vehicle === 'bike' ? 1.8 : 1.0; }

                let moveSpeed = (activeDash ? 35 : 18) * speedMult * dt;
                let mx = 0, mz = 0;
                if(keys.w || keys.ArrowUp) mz -= 1; if(keys.s || keys.ArrowDown) mz += 1;
                if(keys.a || keys.ArrowLeft) mx -= 1; if(keys.d || keys.ArrowRight) mx += 1;
                if(Math.abs(joyX)>0 || Math.abs(joyZ)>0) { mx = joyX; mz = joyZ; }
                
                let pVelX = 0, pVelZ = 0;
                if(mx !== 0 || mz !== 0) {
                    let len = Math.hypot(mx, mz); mx /= len; mz /= len; pVelX = mx * moveSpeed; pVelZ = mz * moveSpeed;
                    
                    if(!checkCollision(playerMesh.position.x + pVelX, playerMesh.position.z, 1.5)) playerMesh.position.x += pVelX;
                    if(!checkCollision(playerMesh.position.x, playerMesh.position.z + pVelZ, 1.5)) playerMesh.position.z += pVelZ;
                    playerMesh.lookAt(playerMesh.position.x + mx, playerMesh.position.y, playerMesh.position.z + mz);
                    
                    if(activeDash && Math.random() > 0.5) spawnDust(playerMesh.position.x, 0, playerMesh.position.z, inWater);
                    
                    // Procedural Sound Effects based on movement
                    footstepTimer += dt;
                    if(footstepTimer > (activeDash ? 0.15 : 0.3)) {
                        playSound(inWater ? 'splash' : 'footstep');
                        footstepTimer = 0;
                    }
                }
                playerMesh.position.y = (inWater && !playerMesh.userData.vehicle) ? -0.5 : 0;

                for(let i=0; i<vehicles.length; i++) {
                    if(playerMesh.position.distanceTo(vehicles[i].mesh.position) < 3) {
                        equipVehicle(playerMesh, vehicles[i].type); scene.remove(vehicles[i].mesh); vehicles.splice(i, 1); i--;
                        playSound('pickup'); showSpeech(playerMesh, "Got a ride!");
                    }
                }

                for(let i=0; i<particles.length; i++) {
                    let p = particles[i]; p.userData.life -= dt * 2; p.position.y += dt; p.scale.setScalar(p.userData.life);
                    if(p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); i--; }
                }

                camera.position.lerp(new THREE.Vector3(playerMesh.position.x, 28, playerMesh.position.z + 32), 0.1);
                camera.lookAt(playerMesh.position);

                // --- AI & DYNAMIC INTERACTIONS ---
                enemies.forEach(e => {
                    let eWater = (currentTheme === 2 && Math.abs(e.mesh.position.z) < 20);
                    let eSpeed = e.speed * (eWater ? 0.4 : 1.0) * dt;

                    let targetX = playerMesh.position.x; let targetZ = playerMesh.position.z;
                    if (e.role === 1) { targetX += pVelX * 30 + pVelZ * 20; targetZ += pVelZ * 30 - pVelX * 20; } 
                    else if (e.role === 2) { targetX += pVelX * 30 - pVelZ * 20; targetZ += pVelZ * 30 + pVelX * 20; } 
                    else if (e.role === 3 && !hasBohu) { targetX = brideMesh.position.x; targetZ = brideMesh.position.z + 8; }

                    if(Math.hypot(targetX - e.mesh.position.x, targetZ - e.mesh.position.z) < 5) { targetX = playerMesh.position.x; targetZ = playerMesh.position.z; }

                    let dx = targetX - e.mesh.position.x; let dz = targetZ - e.mesh.position.z;
                    let dist = Math.hypot(dx, dz);
                    
                    if(dist > 0.5) {
                        let emx = (dx/dist) * eSpeed; let emz = (dz/dist) * eSpeed;
                        if(!checkCollision(e.mesh.position.x + emx, e.mesh.position.z, 1.5)) e.mesh.position.x += emx;
                        if(!checkCollision(e.mesh.position.x, e.mesh.position.z + emz, 1.5)) e.mesh.position.z += emz;
                        e.mesh.lookAt(e.mesh.position.x + emx, e.mesh.position.y, e.mesh.position.z + emz);
                    }
                    e.mesh.position.y = eWater ? -0.5 : 0;

                    let distToPlayer = Math.hypot(playerMesh.position.x - e.mesh.position.x, playerMesh.position.z - e.mesh.position.z);
                    
                    // Interaction: Proximity Taunts
                    if(distToPlayer < 12 && distToPlayer > 5 && (time - e.mesh.userData.lastSpeech > 4)) {
                        const taunts = ["Don't let him pass!", "Cut him off!", "Dhara padiba!"];
                        showSpeech(e.mesh, taunts[Math.floor(Math.random()*taunts.length)]);
                        e.mesh.userData.lastSpeech = time;
                    }
                    
                    // Interaction: Player Cockiness (Dodging)
                    if(distToPlayer < 6 && activeDash && (time - playerMesh.userData.lastSpeech > 5)) {
                        showSpeech(playerMesh, "Too slow!");
                        playerMesh.userData.lastSpeech = time;
                    }

                    if(distToPlayer < 3) {
                        playSound('hit'); lives--; updateUI();
                        if(lives <= 0) gameOver(false);
                        else { 
                            playerMesh.position.set(0, 0, villageSize/2 - 5); e.mesh.position.set((Math.random()-0.5)*40, 0, 0); 
                            equipVehicle(playerMesh, null); showSpeech(e.mesh, "Gotcha!"); 
                        }
                    }
                });

                // Interaction: Rescuing the Bohu
                if(!hasBohu && playerMesh.position.distanceTo(brideMesh.position) < 4) {
                    hasBohu = true; brideMesh.visible = false; 
                    playSound('catch_bohu'); 
                    showSpeech(playerMesh, "Got her! Run!");
                    
                    // Create an invisible anchor for the Bohu's speech bubble so she talks "from" the player
                    setTimeout(() => showSpeech(playerMesh, "Thank you! Get me out!"), 1500);

                    const icon = new THREE.Mesh(new THREE.SphereGeometry(1), new THREE.MeshStandardMaterial({color: 0xd90429}));
                    icon.position.set(2, 3, 0); icon.name = "brideIcon"; playerMesh.add(icon);
                    document.getElementById("status-display").innerText = "Run back to the start!";
                }
                if(hasBohu && playerMesh.position.z > (villageSize/2 - 20)) gameOver(true);

                const tempV = new THREE.Vector3();
                for(let i=0; i<speechBubbles.length; i++) {
                    let b = speechBubbles[i]; b.timer -= dt;
                    if(b.timer <= 0) { document.body.removeChild(b.element); speechBubbles.splice(i, 1); i--; continue; }
                    tempV.copy(b.mesh.position); tempV.y += 4; tempV.project(camera);
                    b.element.style.left = (tempV.x * 0.5 + 0.5) * window.innerWidth + 'px';
                    b.element.style.top = (tempV.y * -0.5 + 0.5) * window.innerHeight + 'px';
                }
            }
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
